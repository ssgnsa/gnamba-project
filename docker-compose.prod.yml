# ============================================
# EGS - Docker Compose PRODUCTION
# ============================================
# Configuration pour déploiement en production avec SSL
# Utiliser avec: docker-compose -f docker-compose.prod.yml up -d
# ============================================

services:
  # ============================================
  # NGINX Reverse Proxy avec SSL
  # ============================================
  nginx-proxy:
    image: nginx:alpine
    container_name: egs-nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - egs-frontend
    networks:
      - egs-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: supabase/postgres:15.1.0.117
    container_name: egs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d/migrations
      - ./backups/postgres:/backups
    networks:
      - egs-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # Kong API Gateway
  # ============================================
  kong:
    image: kong:2.8.1
    container_name: egs-kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,rate-limiting
      KONG_LOG_LEVEL: info
    networks:
      - egs-network
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 10
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # EGS Frontend Application
  # ============================================
  egs-frontend:
    image: egs-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    container_name: egs-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - kong
    networks:
      - egs-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # Supabase Studio (Admin UI - Optionnel en prod)
  # ============================================
  # Décommenter uniquement si nécessaire (protéger par authentification)
  # studio:
  #   image: supabase/studio:20240101-8e4d1f0
  #   container_name: egs-studio
  #   restart: unless-stopped
  #   environment:
  #     STUDIO_PG_META_URL: http://meta:8080
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  #     DEFAULT_ORGANIZATION_NAME: Gnamba Services
  #     DEFAULT_PROJECT_NAME: EGS
  #     SUPABASE_URL: http://kong:8000
  #     SUPABASE_PUBLIC_URL: ${VITE_SUPABASE_URL}
  #   expose:
  #     - "3000"
  #   depends_on:
  #     - postgres
  #   networks:
  #     - egs-network

volumes:
  postgres_data:
    driver: local
  postgres_backups:
    driver: local

networks:
  egs-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
