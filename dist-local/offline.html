<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hors ligne - EGS</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .container {
        background: white;
        border-radius: 20px;
        padding: 40px;
        text-align: center;
        max-width: 500px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      }
      .icon {
        font-size: 80px;
        margin-bottom: 20px;
      }
      h1 {
        color: #1a202c;
        margin-bottom: 10px;
        font-size: 28px;
      }
      p {
        color: #718096;
        margin-bottom: 30px;
        line-height: 1.6;
      }
      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 20px;
        background: #fed7d7;
        color: #c53030;
        border-radius: 50px;
        font-size: 14px;
        font-weight: 500;
        margin-bottom: 30px;
      }
      .status dot {
        width: 8px;
        height: 8px;
        background: #c53030;
        border-radius: 50%;
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
      button {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        padding: 14px 32px;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }
      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
      }
      button:active {
        transform: translateY(0);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">📡</div>
      <h1>Vous êtes hors ligne</h1>
      <div class="status">
        <dot></dot>
        Pas de connexion Internet
      </div>
      <p>
        Ne vous inquiétez pas ! Certaines fonctionnalités restent disponibles en
        mode hors ligne. Vos données seront synchronisées lorsque la connexion
        reviendra.
      </p>
      <button onclick="window.location.reload()">🔄 Réessayer</button>
    </div>
  </body>
</html>
