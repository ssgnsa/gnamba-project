version: "3.8"

services:
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    restart: unless-stopped
    ports:
      - "${FILEBROWSER_PORT:-8081}:80"
    command:
      [
        "--address",
        "0.0.0.0",
        "--port",
        "80",
        "--database",
        "/database/filebrowser.db",
      ]
    volumes:
      # Répertoire de fichiers partagés
      - /home/soma/partage:/srv

      # Disques locaux (exposés dans /srv/Disques/*)
      - /mnt/partage_sdc2:/srv/Disques/SDC2
      - /mnt/partage_sdc3:/srv/Disques/SDC3
      - /mnt/partage_sdd1:/srv/Disques/SDD1
      - /mnt/partage_sdd2:/srv/Disques/SDD2_GHOSTHOME

      # Partages réseau montés (confirmés fonctionnels)
      - /mnt/reseau/Poste2/egsdocuments:/srv/Reseau/Poste2/egsdocuments
      - /mnt/reseau/Poste2/Documents:/srv/Reseau/Poste2/Documents
      - /mnt/reseau/SOMASOULEYMANE/Documents:/srv/Reseau/SOMASOULEYMANE/Documents

      # Partages optionnels (à décommenter si montés avec succès)
      # - /mnt/reseau/Poste2/Proxmox-Backups:/srv/Reseau/Poste2/Proxmox-Backups
      # - /mnt/reseau/Poste2/Proxmox-ISOs:/srv/Reseau/Poste2/Proxmox-ISOs
      # - /mnt/reseau/Poste2/Users:/srv/Reseau/Poste2/Users
      # - /mnt/reseau/Poste3/Users:/srv/Reseau/Poste3/Users
      # - /mnt/reseau/SOMASOULEYMANE/Users:/srv/Reseau/SOMASOULEYMANE/Users

      # Base de données utilisateur
      - /home/soma/filebrowser/database:/database
      # Configuration
      - /home/soma/filebrowser/config:/config
    environment:
      - FB_BASE_URL=/
      - FB_ADDRESS=0.0.0.0
      - FB_PORT=80
    # Run as root to avoid permission issues
    user: "0:0"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:80",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
